name: Sync GitHub Wiki

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Clone repository wiki
        env:
          WIKI_REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: git clone "$WIKI_REPO_URL" wiki-repo

      - name: Synchronize wiki contents
        run: rsync -ac --delete --exclude '.git/' wiki/ wiki-repo/

      - name: Commit synchronized wiki
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi
          git commit -m "Sync wiki from ${GITHUB_SHA}"
          git push